name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Usuarios
        uses: docker/build-push-action@v4
        with:
          context: ./Usuarios
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/usuarios:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Cuentas
        uses: docker/build-push-action@v4
        with:
          context: ./Cuentas
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cuentas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Operaciones
        uses: docker/build-push-action@v4
        with:
          context: ./Operaciones
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/operaciones:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Analisis
        uses: docker/build-push-action@v4
        with:
          context: ./Analisis
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/analisis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Presentacion
        uses: docker/build-push-action@v4
        with:
          context: ./Presentacion
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/presentacion:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-k3s:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare manifests
        run: |
          cp -r k3smanifiestos k8s-deploy
          find k8s-deploy -type f -name "*.yaml" -exec sed -i "s/:latest/:$IMAGE_TAG/g" {} \;

      - name: Copy manifests to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "k8s-deploy/*"
          target: "~/k8s"

      - name: Deploy in K3s via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            kubectl apply -f ~/k8s/

            kubectl rollout status deployment/usuarios --timeout=120s || true
            kubectl rollout status deployment/cuentas --timeout=120s || true
            kubectl rollout status deployment/operaciones --timeout=120s || true
            kubectl rollout status deployment/analisis --timeout=120s || true
            kubectl rollout status deployment/presentacion --timeout=120s || true