name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-filemanager:${{ github.sha }}
          # Para agilizar los build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-filemanager:${{ github.sha }}
          # Para agilizar los build
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-k3s:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Prepare manifest
        run: |
          cp k3s-manifests/app_deploy_2traefiks.yaml app_deploy.yaml
          sed -i "s/IMAGE_TAG/$IMAGE_TAG/g" app_deploy.yaml
      - name: Copy manifest to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          source: "app_deploy.yaml"
          target: "~/"
          timeout: 120s
          command_timeout: 10m
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          envs: IMAGE_TAG,DOCKER_USER
          timeout: 60s
          command_timeout: 10m
          script: |
            # Forzamos la lectura de los certificados de la ruta copiada sobre la que tenemos permisos
            export KUBECONFIG=$HOME/.kube/config

            # Forzar la descarga de nuevas imágenes. Tendría que leer la configuraicón de ~/.kube/config
            #echo "Deploying backend: $DOCKER_USER/backend-filemanager:$IMAGE_TAG"
            #echo "Deploying frontend: $DOCKER_USER/frontend-filemanager:$IMAGE_TAG"

            # Aplicando app_manifest.yaml
            kubectl apply -f app_deploy.yaml

            #kubectl set image deployment/backend-deployment backend=$DOCKER_USER/backend-filemanager:$IMAGE_TAG
            #kubectl set image deployment/frontend-deployment frontend=$DOCKER_USER/frontend-filemanager:$IMAGE_TAG
            #kubectl rollout restart deployment backend-deployment
            #kubectl rollout restart deployment frontend-deployment

            # Verificar el estado
            kubectl rollout status deployment/backend-deployment --timeout=120s || true
            kubectl rollout status deployment/frontend-deployment --timeout=120s || true