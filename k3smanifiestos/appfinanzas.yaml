#MIDDLEWARE
#traefik
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: appfinanzas
spec:
  stripPrefix:
    prefixes:
      - /api
      
---

# INGRESS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: appfinanzas
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: appfinanzas-strip-api@kubernetescrd
spec:
  rules:
  - http:
      paths:
      # FRONTEND
      - path: /
        pathType: Prefix
        backend:
          service:
            name: presentacion
            port:
              number: 80

      # BACKEND
      - path: /api/usuarios
        pathType: Prefix
        backend:
          service:
            name: usuarios
            port:
              number: 80

      - path: /api/cuentas
        pathType: Prefix
        backend:
          service:
            name: cuentas
            port:
              number: 80

      - path: /api/operaciones
        pathType: Prefix
        backend:
          service:
            name: operaciones
            port:
              number: 80

      - path: /api/analisis
        pathType: Prefix
        backend:
          service:
            name: analisis
            port:
              number: 80