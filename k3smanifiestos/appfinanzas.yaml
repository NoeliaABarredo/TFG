#SERVICIOS
#usuarios
#usuarios deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usuarios
  namespace: appfinanzas
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: usuarios
  template:
    metadata:
      labels:
        app: usuarios
    spec:
      containers:
      - name: usuarios
        image: noeuoc/usuarios:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
          - name: DB_HOST
            value: usuarios-db
          - name: DB_USER
            value: root
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: DB_PASSWORD
          - name: JWT_TOKEN
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: JWT_TOKEN
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health.php
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live.php
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

---
#usuarios service
apiVersion: v1
kind: Service
metadata:
  name: usuarios
  namespace: appfinanzas
spec:
  selector:
    app: usuarios
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
#usuarios-db deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usuarios-db
  namespace: appfinanzas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usuarios-db
  template:
    metadata:
      labels:
        app: usuarios-db
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.6
        env:
          - name: MYSQL_ROOT_USER
            value: root
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: DB_PASSWORD
          - name: MYSQL_DATABASE
            value: usuarios_db
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: usuarios-db-storage
          mountPath: /var/lib/mysql   
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          exec:
            command: ["mariadb-admin", "ping", "-h", "localhost"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: usuarios-db-storage
        persistentVolumeClaim:
          claimName: usuarios-pvc


---
#usuarios-db service
apiVersion: v1
kind: Service
metadata:
  name: usuarios-db
  namespace: appfinanzas
spec:
  selector:
    app: usuarios-db
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP

